<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust OAuth Demo</title>
</head>

<body>
    <h1>Welcome to Rust OAuth Demo</h1>

    {% if logged_in %}
    <p>You are logged in as <strong>{{ username.as_ref().unwrap() }}</strong>!</p>
    <p><a href="/ops/auth" class="button">Go to Protected Area</a></p>
    <p><a href="/ops/logout">Logout</a></p>
    {% else %}
    <p>You are not logged in.</p>
    <p><a href="/ops/oauth-login" class="button">Login with GitHub</a></p>
    {% endif %}

</body>

</html>
